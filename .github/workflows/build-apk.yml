name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Recreate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore || openssl base64 -d -A -in debug.keystore.base64 -out debug.keystore
          else
            echo "No debug.keystore.base64 found. Generating a new debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Make Gradlew Executable
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "gradlew not found in repository root. Will use installed Gradle."
          fi

      - name: Create Environment Secrets File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'
          gradle-home-cache-cleanup: true

      - name: Build Debug APK
        run: |
          if [ -f gradlew ]; then
            echo "Building with local Gradle Wrapper..."
            ./gradlew :app:assembleDebug --no-daemon --stacktrace
          else
            echo "Building with installed Gradle 9.3.1..."
            gradle :app:assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: YH-Chat-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

